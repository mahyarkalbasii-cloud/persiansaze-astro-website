<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد — نسخه متحرک</title>
<style>
  body{ margin:0; min-height:100vh; display:grid; place-items:center; background:#141210;
        font-family:"Vazirmatn", system-ui, sans-serif; }
  .shot{ position:relative; width:min(94vmin, 860px); aspect-ratio:1; }
  .shot img{ width:100%; height:100%; display:block; }
  .shot svg{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  /* ── chart comet ── */
  .comet, .comet-core{
    stroke-dasharray: 110 631;
    animation: sweep 7.0s linear infinite;
  }
  @keyframes sweep{ from{stroke-dashoffset:110;} to{stroke-dashoffset:-521;} }

  .tw{ fill:#ffe9cf; opacity:0; transform-box:fill-box; transform-origin:center;
    animation: tw 7.0s linear infinite; }
  @keyframes tw{
    0%,2%{ opacity:0; transform:scale(.5); }
    5%   { opacity:.95; transform:scale(1.25); }
    16%  { opacity:0; transform:scale(.7); }
    100% { opacity:0; }
  }

  /* ── map radar ── */
  .radar{ transform-box:fill-box; transform-origin:center; opacity:0;
    animation: radar 4.4s ease-out infinite; }
  .radar.r2{ animation-delay:2.2s; }
  @keyframes radar{
    0%  { transform:scale(.25); opacity:.8; }
    70% { transform:scale(1.15); opacity:0; }
    100%{ opacity:0; }
  }
  .pinpulse{ transform-box:fill-box; transform-origin:50% 100%;
    animation: pinpulse 4.4s ease-in-out infinite; }
  @keyframes pinpulse{ 0%,100%{opacity:.25;} 50%{opacity:.8;} }

  .pinwink{ fill:#ffdfba; opacity:0; animation: wink 6.5s ease-in-out infinite; }
  @keyframes wink{ 0%,100%{opacity:0;} 50%{opacity:.38;} }

  /* ── timeline drip ── */
  .iconglow{ fill:#ffd9ad; opacity:0; animation: iglow 6s ease-in-out infinite; }
  @keyframes iglow{
    0%,6%{ opacity:0; } 12%{ opacity:.4; } 30%{ opacity:0; } 100%{ opacity:0; }
  }

  /* ── live row dots ── */
  .live{ fill:#ffe2bf; opacity:.15; transform-box:fill-box; transform-origin:center;
    animation: live 5.2s ease-in-out infinite; }
  @keyframes live{
    0%,100%{ opacity:.1; transform:scale(1); }
    50%    { opacity:.85; transform:scale(1.5); }
  }

  /* ── KPI underline sheen ── */
  .sheen{ stroke:#fff0dc; stroke-width:5; stroke-linecap:round; fill:none;
    stroke-dasharray: 26 220; stroke-dashoffset: 26;
    animation: sheen 8s linear infinite; }
  @keyframes sheen{
    0%  { stroke-dashoffset: 26;  opacity:0; }
    4%  { opacity:.9; }
    14% { stroke-dashoffset: -88; opacity:0; }
    100%{ stroke-dashoffset: -88; opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){ .shot svg{ display:none; } }
</style>
</head>
